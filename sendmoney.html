<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Wallet - Enviar Dinero</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    body { padding: 20px; }
    .container { max-width: 450px; margin: 0 auto; }
    .list-group-item { cursor: pointer; }
    .active-contact { background-color: #007bff !important; color: white !important; }
    .active-contact span { color: #f8f9fa !important; }
    #newContactContainer { display: none; background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 15px; }
    #submitSendBtn { display: none; } /* Oculto por defecto */
  </style>
</head>
<body>
  <div class="container">
    <h2>Enviar Dinero</h2>
    <div id="alertMessage" class="alert d-none"></div>

    <div class="form-group">
      <label for="searchContact">Buscar contacto por nombre o alias:</label>
      <input type="text" class="form-control" id="searchContact" placeholder="Ej: John o jane.smith">
    </div>
    
    <button type="button" id="showContactFormBtn" class="btn btn-outline-primary btn-block mb-3">
      Agregar nuevo contacto
    </button>

    <div id="newContactContainer">
      <h5>Nuevo Contacto</h5>
      <form id="newContactForm">
        <div class="form-group">
          <label>Nombre y Apellido</label>
          <input type="text" id="newName" class="form-control">
        </div>
        <div class="form-group">
          <label>Número de CBU (8 dígitos requerido para prueba)</label>
          <input type="number" id="newCbu" class="form-control">
        </div>
        <div class="form-group">
          <label>Alias</label>
          <input type="text" id="newAlias" class="form-control">
        </div>
        <div class="form-group">
          <label>Nombre del Banco</label>
          <input type="text" id="newBanco" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary btn-sm">Guardar Contacto</button>
        <button type="button" id="cancelContactBtn" class="btn btn-secondary btn-sm">Cancelar</button>
      </form>
    </div>

    <h3>Contactos</h3>
    <ul id="contactList" class="list-group mb-3">
      <li class="list-group-item contact-item" data-name="John Doe" data-alias="john.doe">
        <div class="contact-info">
          <strong class="name-tag">John Doe</strong><br>
          <span class="small text-muted">CBU: 12345678, Alias: john.doe, Banco: ABC Bank</span>
        </div>
      </li>
      <li class="list-group-item contact-item" data-name="Jane Smith" data-alias="jane.smith">
        <div class="contact-info">
          <strong class="name-tag">Jane Smith</strong><br>
          <span class="small text-muted">CBU: 87654321, Alias: jane.smith, Banco: XYZ Bank</span>
        </div>
      </li>
    </ul>

    <form id="sendMoneyForm">
      <div class="form-group">
        <label for="selectedContactName">Contacto Seleccionado:</label>
        <input type="text" class="form-control" id="selectedContactName" readonly placeholder="Ninguno seleccionado" required>
      </div>
      <div class="form-group">
        <label for="sendAmount">Monto a enviar:</label>
        <input type="number" step="0.01" class="form-control" id="sendAmount" placeholder="Monto a transferir" required>
      </div>
      <button type="submit" id="submitSendBtn" class="btn btn-primary btn-block">Enviar dinero</button>
    </form>
    
    <div id="bottomConfirmation" class="alert alert-success d-none mt-3 text-center"></div>
    <br>
    <a href="menu.html" class="btn btn-secondary btn-block">Volver al Menú Principal</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function() {
      // 1. Mostrar y ocultar formulario de contactos
      $('#showContactFormBtn').click(function() {
        $('#newContactContainer').slideDown();
      });
      $('#cancelContactBtn').click(function() {
        $('#newContactContainer').slideUp();
        $('#newContactForm')[0].reset();
      });

      // 2. Validar y agregar nuevo contacto
      $('#newContactForm').submit(function(e) {
        e.preventDefault();
        const name = $('#newName').val().trim();
        const cbu = $('#newCbu').val().trim();
        const alias = $('#newAlias').val().trim();
        const banco = $('#newBanco').val().trim();

        if(!name || !cbu || !alias || !banco) {
          alert("Todos los campos son obligatorios.");
          return;
        }
        if(cbu.length < 6) { // Validación simple de formato de CBU
          alert("Por favor ingrese un CBU válido.");
          return;
        }

        // Crear elemento dinámicamente
        const newLi = `
          <li class="list-group-item contact-item" data-name="${name}" data-alias="${alias}">
            <div class="contact-info">
              <strong class="name-tag">${name}</strong><br>
              <span class="small text-muted">CBU: ${cbu}, Alias: ${alias}, Banco: ${banco}</span>
            </div>
          </li>`;
        
        $('#contactList').append(newLi);
        $('#newContactContainer').slideUp();
        $('#newContactForm')[0].reset();
      });

      // 3. Selección de contacto y Mostrar/Ocultar botón "Enviar dinero"
      $(document).on('click', '.contact-item', function() {
        $('.contact-item').removeClass('active-contact');
        $(this).addClass('active-contact');
        
        const targetName = $(this).attr('data-name');
        $('#selectedContactName').val(targetName);
        
        // Mostrar botón cuando hay uno seleccionado
        $('#submitSendBtn').fadeIn();
      });

      // 4. Realizar búsqueda en la agenda por nombre o alias
      $('#searchContact').on('input', function() {
        const query = $(this).val().toLowerCase();
        $('.contact-item').each(function() {
          const name = $(this).attr('data-name').toLowerCase();
          const alias = $(this).attr('data-alias').toLowerCase();
          
          if(name.includes(query) || alias.includes(query)) {
            $(this).show();
          } else {
            $(this).hide();
          }
        });
      });

      // 5. Enviar dinero y confirmación final
      $('#sendMoneyForm').submit(function(e) {
        e.preventDefault();
        const contact = $('#selectedContactName').val();
        const amount = parseFloat($('#sendAmount').val());
        let currentBalance = parseFloat(localStorage.getItem('walletBalance') || '60000');

        if (amount > currentBalance) {
          alert("Fondos insuficientes.");
          return;
        }

        // Procesar saldos
        let newBalance = currentBalance - amount;
        localStorage.setItem('walletBalance', newBalance.toString());

        let transactions = JSON.parse(localStorage.getItem('walletTransactions') || '[]');
        transactions.unshift(`Envío a ${contact} - $${amount.toFixed(2)}`);
        localStorage.setItem('walletTransactions', JSON.stringify(transactions));

        // Mostrar mensaje de confirmación en la parte inferior
        $('#bottomConfirmation')
          .text(`✔ Envío realizado con éxito: Se transfirieron $${amount.toFixed(2)} a ${contact}.`)
          .removeClass('d-none');

        setTimeout(() => {
          window.location.href = 'menu.html';
        }, 2500);
      });
    });
  </script>
</body>
</html>
