<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Wallet - Menú Principal</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    body { padding: 20px; }
    .container { max-width: 400px; margin: 0 auto; }
    .nav-btn { display: block; width: 100%; margin-bottom: 10px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Menú Principal</h2>
    <div id="redirectLegend" class="alert alert-info d-none text-center"></div>
    
    <div class="form-group text-center my-4">
      <label><strong>Dinero en cuenta:</strong></label>
      <h3 id="balanceDisplay">$0.00</h3>
    </div>
    
    <button class="btn btn-primary nav-btn" data-target="deposit.html" data-name="Depósito">Depositar</button>
    <button class="btn btn-primary nav-btn" data-target="sendmoney.html" data-name="Enviar Dinero">Enviar Dinero</button>
    <button class="btn btn-primary nav-btn" data-target="transactions.html" data-name="Últimos Movimientos">Últimos Movimientos</button>
    <hr>
    <a href="index.html" class="btn btn-light btn-block btn-sm">Cerrar Sesión</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function() {
      // Cargar saldo dinámico con jQuery
      const currentBalance = localStorage.getItem('walletBalance') || '60000';
      $('#balanceDisplay').text(`$${parseFloat(currentBalance).toFixed(2)}`);

      // Agregar eventos a los tres botones con jQuery
      $('.nav-btn').click(function() {
        const target = $(this).attr('data-target');
        const screenName = $(this).attr('data-name');
        const $legend = $('#redirectLegend');
        
        // Muestra la leyenda de redirección
        $legend.text(`Redirigiendo a ${screenName}...`).removeClass('d-none');
        
        setTimeout(() => {
          window.location.href = target;
        }, 1000);
      });
    });
  </script>
</body>
</html>
